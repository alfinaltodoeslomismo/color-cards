<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Color Generator</title>
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
    <div class="color-card">
        <div class="color-box" id="color-box">
            <span class="color-code" id="color-code">#FFFFFF</span>
            <button class="copy-btn" onclick="copyColorCode()">Copy</button>
        </div>
        <button class="generate-btn" onclick="generateNewColor()">Generate New Color</button>
    </div>
    <script src="./js/script.js"></script>
</body>
</html>
